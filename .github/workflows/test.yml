name: tests

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on new pushes to the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure git identity for tmp_repo fixture
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name  "CI"

      - name: Run tests
        # codex CLI is not available on GitHub runners; the test suite uses
        # --no-codex by default in phase-a tests and the
        # test_phase_a_codex_preflight_fires_when_codex_missing test
        # self-skips when codex IS installed. gh is pre-installed on
        # ubuntu-latest and tests use fake_bin stubs anyway.
        run: pytest -v
